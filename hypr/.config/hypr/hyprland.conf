# =================================
#  @snes19xx · Hyprland CONFIG   
# ================================

#[NOTES:
#     * Please read the entire config before using, remove unwanted/unnecessary lines
#     * I use windows 7 system sounds if anyone's curious
#     * (do not forget the `bindl = , switch:off:Lid`  and `bindl = , switch:on:Lid`   lines)]


# ─── [GENERAL] ─────────────────────────────────────────────────────────────────────────────────
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,volantes_cursors
env = XCURSOR_SIZE,32
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = TERMINAL,kitty
env = QT_QPA_PLATFORMTHEME,kde
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORM,wayland;xcb

# Startup sound
exec-once = sleep 1 && mpv --no-video --volume=100 /home/syd/.config/hypr/sounds/startup.wav

# Shader
exec-once = hyprshade on main.glsl

# ────────────────────────────────────────────────────────────────────────────────────────────────
################
### MONITORS ###
################

monitor = eDP-1, 2560x1440@60, 0x0, 1, bitdepth, 10, cm, srgb
monitor = DP-2, 3840x2160@60, 2256x0, 2
monitor = HDMI-A-2, 3840x2160@60, 0x0, 1
#monitor = eDP-1,2256x1504@60,0x0,1.56666667, cm, srgb
#monitor = DP-2, 3840x2160@60, 1440x0, 2

# catch-all for any monitor not listed above - workspace1_manager.py reads
# the real resolution at runtime so this is enough on its own
monitor = , preferred, auto, 1

render {
    cm_enabled = true
    cm_auto_hdr = 01
    cm_fs_passthrough = 0
    cm_sdr_eotf = 0
}

# workspaces 1 and 2 stay unpinned on purpose (gaming and the grid need to
# work on whatever monitor is actually connected)
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2

bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 2256x1504@60, 0x0, 1.33, cm, srgb"
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"

exec-once = hyprpaper

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
###################
### MY PROGRAMS ###
###################

$mainMod = SUPER
$alt     = ALT

$terminal     = kitty
$fileManager  = thunar
$menu         = /home/syd/.config/rofi/rofi_wide.sh

# Script paths 
$HYPR_SCRIPTS     = ~/.config/hypr/scripts
$BRIGHT_SCRIPT    = $HYPR_SCRIPTS/brightnesscontrol.sh
$SCREENSHOT_SCRIPT= $HYPR_SCRIPTS/screenshot.sh
$AUDIO_SCRIPT     = $HYPR_SCRIPTS/audiocontrol.sh
$MEDIA_SCRIPT     = $HYPR_SCRIPTS/mediacontrol.sh

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
#################
### AUTOSTART ###
#################
exec-once = sleep 3 && ~/.config/hypr/launch-workspace1.sh
exec-once = sleep 4 && ~/.config/hypr/launch-workspace3.py

exec-once = dunst
exec-once = blueman-applet
exec-once = vdirsyncer sync
#exec-once = qs -c snes-hub
exec-once = qs -c task-bar
exec-once = hyprpaper
exec-once = sleep 1 && waypaper --wallpaper /home/syd/Pictures/desktop/forest-gradient.png --backend hyprpaper
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = systemctl --user start sunshine
exec-once = sleep 1 && hyprctl plugin load /home/syd/projects/hyprworkstation-plugin/build/libhyprworkstation.so
exec-once = sleep 1 && env WAYLAND_DISPLAY=$WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE=$HYPRLAND_INSTANCE_SIGNATURE XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR /home/syd/.config/hypr/workspace1_live_resize.py
#exec-once = hyprctl plugin load /home/syd/hyprselect/hyprselect.so 

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
#####################
### LOOK AND FEEL ###
#####################

    general {
        gaps_in = 5
        gaps_out = 10
        border_size = 2

        col.active_border = rgba(76cc88dd) rgba(00bbaadd) 45deg
        col.inactive_border = rgba(38aa55bb) rgba(2a8877bb) 45deg

        resize_on_border = false
        allow_tearing = false
        layout = dwindle
    }

    decoration {
        rounding = 12
        active_opacity = 1.0
        inactive_opacity = 0.85

        # DIMMING
        dim_inactive = true
        dim_strength = 0.15
        dim_around = 0.6
        shadow {
            enabled = true
            range = 35
            render_power = 3
            color = rgba(52cc7799)
            color_inactive = rgba(38aa5566)
        }

        blur {
            enabled = true
            size = 5
            passes = 4
            new_optimizations = true
            xray = true
            popups = true
        }
    }

    animations {
        enabled = yes

        bezier = easeOutQuint, 0.22, 1, 0.36, 1
        bezier = easeInQuart, 0.89, 0.03, 0.68, 0.19
        bezier = softLinear, 0.1, 0.1, 1, 1

        animation = windows,     1, 3, easeOutQuint, popin 90%
        animation = windowsIn,   1, 3, easeOutQuint, popin 90%
        animation = windowsOut,  1, 2, easeInQuart, popin 95%
        animation = windowsMove, 1, 3, easeOutQuint, slide
        animation = fade,        1, 3, softLinear
        animation = workspaces,  1, 4, easeOutQuint, slidefade 20%
    }

    dwindle {
        pseudotile = true
        preserve_split = true
        # smart_split = true
        smart_resizing = true
    }

    master {
        new_status = master
    }

    group {
        col.border_active = rgba(00000000)
        col.border_inactive = rgba(00000000)

        groupbar {
            enabled = true
            height = 16
            gradients = true
            col.active = rgb(76c479)
            col.inactive = rgba(2D353Bff)
            keep_upper_gap = false
            indicator_height = 0    
            indicator_gap = 0       # The gap between indicator and title
            gaps_in = 0             # Space between tabs
            gaps_out = 9            # Space between bar and window
            gradient_rounding = 8    
        
            font_family = Inter
            font_size = 11
            font_weight_active = medium
            font_weight_inactive = medium
            text_color = rgb(293136)
            text_color_inactive = rgba(e5e6c5ff)
            text_offset = 1         
        }
    }
#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
#############
### INPUT ###
#############
    input {
        kb_layout = us
        follow_mouse = 1
        sensitivity = 0.35
        repeat_rate = 50
        repeat_delay = 300
        touchpad {
            natural_scroll = true
            disable_while_typing = true
        }
    }

# Three Finger Gestures
gesture = 3, vertical, fullscreen

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
####################
### KEYBINDINGS  ###
####################

# Hub toggles
bind = SUPER, SPACE, global, quickshell:hubToggle
bind = SUPER, TAB, global, quickshell:workspace1GestureToggle
bind = SUPER, grave, exec, /home/syd/.config/hypr/workspace1_manager.py reset-layout

# Content zoom (font/page size, not the window itself)
binde = SUPER, KP_Add, exec, /home/syd/.config/hypr/content_zoom.sh in all
binde = SUPER, KP_Subtract, exec, /home/syd/.config/hypr/content_zoom.sh out all
binde = SUPER SHIFT, KP_Add, exec, /home/syd/.config/hypr/content_zoom.sh in focused
binde = SUPER SHIFT, KP_Subtract, exec, /home/syd/.config/hypr/content_zoom.sh out focused

# Modes
bind = $mainMod, D, exec, /home/syd/.config/hypr/shaders/reading_mode.sh               
bind = $mainMod, N, exec, /home/syd/.config/hypr/shaders/night_light.sh
bind = $alt, C, exec, /home/syd/.config/hypr/shaders/crt_mode.sh

# Apps
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, firefox
bind = $mainMod, S, exec, lens --no-decorations --sniper
bind = $mainMod SHIFT, T, exec, bash ~/.config/hypr/themer/launch.sh

# Window actions
bind = $mainMod, X, killactive
bind = $mainMod, F, togglefloating
bind = $mainMod $alt, F, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 900 600 && hyprctl dispatch centerwindow
bind = $mainMod, F11, exec, /home/syd/.config/hypr/workspace1_manager.py toggle-expand-current
bind = $mainMod, M, fullscreen
bind = $mainMod SHIFT, F11, exec, /home/syd/.config/hypr/workspace1_manager.py toggle-true-fullscreen-current
bind = $mainMod, P, pseudo
bind = $mainMod, DOWN, togglesplit
bind = $mainMod, UP, togglesplit
bind = $mainMod, G, togglegroup
bind = $mainMod, L, setfloating, 
bind = $mainMod, L, resizeactive, exact 1440 1080

# Group
bind = $mainMod CTRL, left, changegroupactive, next
bind = $mainMod CTRL, right, changegroupactive, previous

# Exit 
bind = $mainMod $alt, F4, exec, hyprctl dispatch exit
bind = $alt, F4, exec, quickshell -p ~/.config/quickshell/task-bar/utils/PowerMenu.qml 

# uncomment if you're using top bar
#bind = $alt, F4, exec, quickshell -p ~/.config/quickshell/top-bar/bar/PowerMenu.qml  

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod SHIFT, up,    movefocus, u
bind = $mainMod SHIFT, down,  movefocus, d

# Workspace 1: gaming (Steam/Discord)
bind = $mainMod, 1, workspace, 1
# Workspace 2: the managed workstation grid
bind = $mainMod, 2, workspace, 2
# Workspace 3: monitoring/dashboard
bind = $mainMod, 3, workspace, 3

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Fn keys
bind = , XF86MonBrightnessDown, exec, $BRIGHT_SCRIPT d
bind = , XF86MonBrightnessUp,   exec, $BRIGHT_SCRIPT i
bind = , XF86AudioRaiseVolume, exec, $AUDIO_SCRIPT i
bind = , XF86AudioLowerVolume, exec, $AUDIO_SCRIPT d
bind = , XF86AudioMute,        exec, $AUDIO_SCRIPT m
bind = , XF86AudioPlay, exec, $MEDIA_SCRIPT

# Screenshots
bind = , Print, exec, $SCREENSHOT_SCRIPT s
bind = $mainMod, Print, exec, $SCREENSHOT_SCRIPT p
bind = $mainMod SHIFT, Print, exec, $SCREENSHOT_SCRIPT sf
# No physical Print key on this keyboard - numpad / as an alternative
bind = , KP_Divide, exec, $SCREENSHOT_SCRIPT s
bind = $mainMod, KP_Divide, exec, $SCREENSHOT_SCRIPT p
bind = $mainMod SHIFT, KP_Divide, exec, $SCREENSHOT_SCRIPT sf
bind = $mainMod, O, exec, $SCREENSHOT_SCRIPT m
bind = $mainMod SHIFT, L, exec, grimblast copy area
bind = $mainMod, E, exec, kitty --class yazi yazi

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
##############################
###      WINDOW RULES     ###
#############################

# No borders for grouped windows
windowrule = match:group 1, border_size -6
windowrule = match:group 1, no_shadow on
#windowrule = match:group 1, rounding 0

# kitty
windowrule = match:class ^(kitty)$, float on, size 700 400, center on, rounding 10, opacity 0.9 0.9

# grid/half slots spawn floating and off-screen, workspace1_manager.py moves
# them into place once it has the window address - avoids any tiled/wrong-spot flash
windowrule = match:class ^(ws1-slot-tl|ws1-slot-tr|ws1-slot-bl|ws1-slot-br|ws1-half-left|ws1-half-right)$, float on, move -10000 -10000
windowrule = match:class ^(ws3-cluster)$, float on, move -10000 -10000

# spotify isn't part of the managed grid, just give it a sane default
windowrule = match:class ^(spotify|Spotify)$, float on, size 1600 1000, center on

# workspace 2 (the grid) layout is handled by ~/.config/hypr/launch-workspace1.sh

# Workspace 1: gaming. Steam/Discord always land here; with only two
# windows open, the default dwindle layout tiles them as two big side-by-
# side panes automatically - no custom geometry scripting needed.
windowrule = match:class ^(steam|Steam)$, workspace 1 silent
windowrule = match:class ^(discord|Discord)$, workspace 1 silent

# zathura
windowrule = match:class ^(org.pwmt.zathura)$, float on, size 750 1000

# blueman-manager
windowrule = match:class ^(blueman-manager)$, float on, size 500 300, move 1165 777, rounding 10, opacity 0.90 0.90, border_size 1, border_color rgb(76c479) rgb(1a2f1e), animation popin, dim_around on

# nm-connection-editor
windowrule = match:class ^(nm-connection-editor)$, float on, size 500 600, center on, rounding 10, opacity 0.95 0.95, border_color rgb(76c479)

# com.snes.evercal
windowrule = float on, size 1000 650, center on, border_size 1, rounding 18, match:class ^(com.snes.evercal)$

#  Lollypop
windowrule=float on, size 900 600, match:class ^(org.gnome.Lollypop)$

# Portal impls (GTK / KDE / Hyprland) + common polkit agents
windowrule = match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland|org.freedesktop.impl.portal.desktop.gtk|org.freedesktop.impl.portal.desktop.kde)$, tag portal-ui
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1|lxqt-policykit-agent|mate-polkit)$, tag portal-ui
windowrule = match:class ^(xdg-desktop-portal-gtk)$,float on, center on, size 700 400

# Password / keyring / pinentry style prompts 
windowrule = match:class ^(pinentry|pinentry-gtk-2|pinentry-gnome3|gcr-prompter)$, tag portal-ui
windowrule = match:class ^(ssh-askpass|sshaskpass)$, tag portal-ui
windowrule = match:class ^(org.kde.plasma-systemmonitor)$, size 1000 700, float on, rounding 14

windowrule = match:tag portal-ui, float on, center on, rounding 10
windowrule = match:tag portal-ui, size 1100 750
windowrule = match:tag portal-ui, dim_around on
windowrule = match:tag portal-ui, opacity 0.95 0.95

# firefox
windowrule = match:class ^(firefox)$, float on, size 1400 900, center on

# lens
windowrule = match:class ^(lens)$, float on, center on, size 1000 700, rounding 10, border_color rgb(2a4a2a)

# hypr-themer
windowrule = match:class ^(com.snes.hyprthemer)$, float on, size 377 492

# vscode
windowrule = match:class ^(code)$, opacity 0.9 0.9

# Thunar 
windowrule = match:class ^(thunar)$, opacity 0.9 0.9
windowrule = match:class ^(thunar)$, match:float true, size 900 600, center on

# “always dialogs”
windowrule = match:modal true, float on, center on, rounding 10
windowrule = match:class ^(xdg-desktop-portal-hyprland)$, float on
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.gtk)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on

# common sub-window titles
windowrule = match:title ^(Open File)(.*)$, float on, center on
windowrule = match:title ^(Select a File)(.*)$, float on, center on
windowrule = match:title ^(Choose wallpaper)(.*)$, float on, center on
windowrule = match:title ^(Open Folder)(.*)$, float on, center on
windowrule = match:title ^(Save As)(.*)$, float on, center on
windowrule = match:title ^(Library)(.*)$, float on, center on
windowrule = match:title ^(File Upload)(.*)$, float on, center on
windowrule = match:title ^(Extract archive)$, float on, center on
windowrule = match:title ^(Confirm to replace files)$, float on, center on
windowrule = match:title ^(Rename)(.*)$, float on, center on
windowrule = match:title ^(Create New Folder)$, float on, center on
windowrule = match:title ^(Properties)$, float on, center on
windowrule = match:title ^(Extract)$, float on, center on
windowrule = match:title ^(Extract to)$, float on, center on
windowrule = match:title ^(File Operation Progress)$, float on, center on

# dim rules
windowrule = match:title ^(Open File)(.*)$, dim_around on
windowrule = match:title ^(Save As)(.*)$, dim_around on
windowrule = match:title ^(Confirm to replace files)$, dim_around on

# visuals for ALL floating windows
#windowrule = match:float true, border_color rgb(87b158)

#xdm-app
windowrule = match:class ^(xdm-app)$, float on, size 700 400, rounding 10, opacity 0.8 0.8, center on

# sizes
windowrule = match:title ^(Open File)(.*)$, size 900 600
windowrule = match:title ^(Confirm to replace files)(.*)$, size 500 300
windowrule = match:title ^(File Operation Progress)(.*)$, size 500 300
windowrule = match:title ^(Save As)(.*)$, size 900 600
windowrule = match:title ^(File Upload)(.*)$, size 900 600
windowrule = match:title ^(Rename)(.*)$, size 450 200
windowrule = match:title ^(Create New Folder)$, size 450 200
windowrule = match:title ^(Properties)$, size 500 600

# File Roller
windowrule = match:class ^(org.gnome.FileRoller)$, float on, size 500 350, center on, rounding 10, border_color rgb(76c479)

# Now_playing widget (1178 for 1.55)
windowrule = match:class ^(com.snes.nowplaying)$, float on, pin on, border_size 1, border_color rgb(76c479), animation slide, move 1433 44 ,opacity 0.9 0.9

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
#######################
###   LAYER RULES   ###
#######################

layerrule = xray 0, match:namespace quickshell

# ROFI
# layerrule = match:namespace rofi, ignore_alpha 0.1
#layerrule = match:namespace rofi, animation slide bottom
#layerrule = match:namespace rofi, dim_around on
layerrule = animation slide bottom 1, match:namespace rofi
animations {
    enabled = true

    animation = layers, 1, 3, default
}

# HUB (Control Center + power menu)
# layerrule = match:namespace snes-hub, animation slide top
# layerrule = match:namespace snes-hub, dim_around on
layerrule = match:namespace power-menu, animation popin 99%, dim_around on
# layerrule = match:namespace wifi-menu, animation slide right, dim_around on

#────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
###########
### XWL ###
###########

xwayland {
    force_zero_scaling = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    animate_manual_resizes = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
}
